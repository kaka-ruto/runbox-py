name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run Ruff (Lint)
        run: ruff check .
        if: matrix.python-version == '3.12'

      - name: Run MyPy (Type Check)
        run: mypy src
        if: matrix.python-version == '3.12'

  integration:
    runs-on: ubuntu-latest
    needs: test

    services:
      runbox:
        image: ghcr.io/anywaye/runbox:latest
        ports:
          - 8080:8080
        env:
          RUNBOX_API_KEY: test-integration-key
        options: >-
          --health-cmd "curl -f http://localhost:8080/v1/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Wait for Runbox to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/v1/health; then
              echo "Runbox is ready!"
              break
            fi
            echo "Waiting for Runbox... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        env:
          RUNBOX_URL: http://localhost:8080
          RUNBOX_API_KEY: test-integration-key
        run: python examples/integration_test.py
