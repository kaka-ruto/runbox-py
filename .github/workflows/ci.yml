name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run Ruff (Lint)
        run: ruff check .
        if: matrix.python-version == '3.12'

      - name: Run MyPy (Type Check)
        run: mypy src
        if: matrix.python-version == '3.12'

  integration:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Start Runbox service
        run: |
          git clone https://github.com/kaka-ruto/runbox.git ../runbox
          cd ../runbox
          cp .env.example .env
          echo "RUNBOX_API_KEY=test-integration-key" >> .env
          cat > runbox.yml <<'EOF'
          server:
            host: "0.0.0.0"
            port: 8080
          auth:
            enabled: true
          languages:
            python:
              image: "ghcr.io/kaka-ruto/runbox/python:0.1.0"
              entrypoint_cmd: "python"
            ruby:
              image: "ghcr.io/kaka-ruto/runbox/ruby:0.1.0"
              entrypoint_cmd: "ruby"
            shell:
              image: "ghcr.io/kaka-ruto/runbox/shell:0.1.0"
              entrypoint_cmd: "bash"
          EOF
          docker compose up -d --build

      - name: Wait for Runbox to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/v1/health; then
              echo "Runbox is ready!"
              break
            fi
            echo "Waiting for Runbox... ($i/30)"
            sleep 2
          done

      - name: Run integration tests
        env:
          RUNBOX_URL: http://localhost:8080
          RUNBOX_API_KEY: test-integration-key
        run: python examples/integration_test.py

      - name: Stop Runbox service
        if: always()
        run: |
          cd ../runbox
          docker compose down -v
